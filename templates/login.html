<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Thrive Space</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left-section">

        <div class="overlay">

            <h1>Thrive Space</h1>

            <p>Your space. Your pace. Your peace.</p>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-section">

        <div class="login-card">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to continue your wellness journey.
            </p>

            <form method="POST">

                <input
                type="email"
                name="email"
                placeholder="Email"
                required>

                <input
                type="password"
                name="password"
                placeholder="Password"
                required>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
