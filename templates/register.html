<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="left-section">

        <div class="overlay">

            <h1>Join Thrive Space</h1>

            <p>Start your wellness journey today.</p>

        </div>

    </div>

    <div class="right-section">

        <div class="login-card">

            <h2>Create Account</h2>

            <p class="subtitle">
                Create your peaceful space.
            </p>

            <form method="POST">
<p class="switch-page">

    Already have an account?

    <a href="/login">
        Login
    </a>

</p>
                <input
                type="text"
                name="username"
                placeholder="Username"
                required>

                <input
                type="email"
                name="email"
                placeholder="Email"
                required>

                <input
                type="password"
                name="password"
                placeholder="Password"
                required>

                <button type="submit">
                    Register
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
